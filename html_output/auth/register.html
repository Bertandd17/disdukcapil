<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Disdukcapil Kabupaten Toba</title>
    <link rel="icon" type="image/jpeg" href="https://via.placeholder.com/64x64/0052CC/FFFFFF?text=T">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { primary: { 50:'#E6F0FF', 100:'#CCE0FF', 500:'#0066FF', 600:'#0052CC', 700:'#003D9A', 800:'#002B6E' } }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(135deg, #0052CC 0%, #0066FF 50%, #0047B3 100%); min-height: 100vh; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s ease-out; }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-12">

    <div class="w-full max-w-lg relative z-10 fade-in">
        <a href="login.html" class="inline-flex items-center gap-2 text-white/80 hover:text-white mb-6 transition">
            <i class="fas fa-arrow-left"></i>Kembali ke Login
        </a>

        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-user-plus text-white text-3xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-gray-800">Pendaftaran Akun</h1>
                <p class="text-gray-500 text-sm mt-1">Daftarkan akun untuk mengakses layanan</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Lengkap *</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none" placeholder="Nama lengkap Anda">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email *</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none" placeholder="email@contoh.com">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">NIK *</label>
                    <input type="text" name="nik" required maxlength="16" pattern="[0-9]{16}" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none" placeholder="16 digit NIK">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">No. Telepon *</label>
                    <input type="tel" name="phone" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none" placeholder="08xxxxxxxxxx">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password *</label>
                    <input type="password" name="password" required minlength="8" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none" placeholder="Minimal 8 karakter">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Konfirmasi Password *</label>
                    <input type="password" name="password_confirmation" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none" placeholder="Ulangi password">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Pertanyaan Keamanan *</label>
                    <select name="security_question" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 outline-none">
                        <option value="">-- Pilih Pertanyaan --</option>
                        <option value="1">Siapa nama ibu kandung Anda?</option>
                        <option value="2">Apa kota kelahiran Anda?</option>
                        <option value="3">Apa nama sekolah SD Anda?</option>
                        <option value="4">Siapa nama hewan peliharaan Anda?</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Jawaban *</label>
                    <input type="text" name="security_answer" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none" placeholder="Jawaban Anda">
                </div>

                <div class="flex items-start gap-2">
                    <input type="checkbox" id="agree" required class="mt-1 w-4 h-4 text-primary-600 rounded">
                    <label for="agree" class="text-xs text-gray-600">Saya menyetujui <a href="#" class="text-primary-600 font-semibold">syarat & ketentuan</a> dan <a href="#" class="text-primary-600 font-semibold">kebijakan privasi</a> yang berlaku.</label>
                </div>

                <button type="submit" class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-700 text-white rounded-xl font-bold hover:from-primary-700 hover:to-primary-800 transition shadow-lg flex items-center justify-center gap-2">
                    <i class="fas fa-user-plus"></i>Daftar
                </button>
            </form>

            <p class="text-center text-sm text-gray-600 mt-6">
                Sudah punya akun? <a href="login.html" class="text-primary-600 font-semibold hover:text-primary-700">Login di sini</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (this.password.value !== this.password_confirmation.value) {
                Swal.fire({ icon: 'error', title: 'Password Tidak Cocok', text: 'Password dan konfirmasi harus sama', confirmButtonColor: '#0052CC' });
                return;
            }
            Swal.fire({
                title: 'Mendaftar...',
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                Swal.fire({
                    title: 'Pendaftaran Berhasil!',
                    text: 'Silakan login dengan akun baru Anda',
                    icon: 'success',
                    confirmButtonColor: '#0052CC'
                }).then(() => {
                    window.location.href = 'login.html';
                });
            });
        });
    </script>
</body>
</html>
